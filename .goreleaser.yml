version: 2

project_name: ims

builds:
  - main: ./cmd/ims/main.go
    binary: ims
    env:
      - CGO_ENABLED=0
    flags:
      - -tags
      - netgo
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

dockers:
  - image_templates:
      - "wyattjoh/ims:{{ .Tag }}"
      - "wyattjoh/ims:v{{ .Major }}.{{ .Minor }}"
      - "wyattjoh/ims:v{{ .Major }}"
      - "wyattjoh/ims:latest"
      - "ghcr.io/wyattjoh/ims:{{ .Tag }}"
      - "ghcr.io/wyattjoh/ims:v{{ .Major }}.{{ .Minor }}"
      - "ghcr.io/wyattjoh/ims:v{{ .Major }}"
      - "ghcr.io/wyattjoh/ims:latest"

brews:
  - repository:
      owner: wyattjoh
      name: homebrew-stable
    directory: Formula
    homepage: https://github.com/wyattjoh/ims
    description: image manipulation service, written in Go
    license: MIT
    test: |
      system "#{bin}/ims", "-v"
    install: |
      bin.install "ims"

archives:
  - name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE.md
      - README.md

release:
  github:
    owner: wyattjoh
    name: ims
